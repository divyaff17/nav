<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="kush patel">
  <title>Campus Navigator</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="background-wrapper">
    <div class="blob-box blob-one"></div>
    <div class="blob-box blob-two"></div>
    <div class="blob-box blob-three"></div>
  </div>

  <div id="main-container">
    <div id="header-area">
      <h1>Campus <span id="text-highlight">Navigator</span></h1>
      <p>Select your route, follow the visual guide, and reach your destination with ease.</p>
    </div>

    <div id="controls-area">
      <div class="input-group">
        <label>Starting Point</label>
        <div id="start-box">
          🎭 Theater
        </div>
      </div>
      <div class="input-group">
        <label>Destination</label>
        <select id="toSelect"></select>
      </div>
      <button id="buildBtn" class="action-btn">Find Route</button>
    </div>

    <p id="feedback"></p>

    <div id="routeSummary" style="display: none;"></div>

    <div id="stage" style="display: none;">
      <div id="top-bar">
        <strong id="stepTitle"></strong>
        <span id="stepCounter"></span>
      </div>

      <div id="photo-box">
        <div id="imageLoader">
          <div id="loading-spinner"></div>
          <span id="loading-text">Loading Route Image...</span>
        </div>
        
        <div id="photoFrame">
          <img id="stepPhoto" alt="Direction step photo" />
          <div id="arrowOverlay">
            <svg id="arrowSvg" viewBox="0 0 120 120" aria-hidden="true"></svg>
            <span id="arrowText"></span>
          </div>
        </div>
      </div>

      <p id="stepDesc"></p>

      <div id="button-row">
        <button id="prevBtn" class="alt-btn">Previous</button>
        <button id="nextBtn" class="action-btn">Next</button>
      </div>
    </div>

    <div id="timeline" style="display: none;"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
