<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- author info -->
  <meta name="author" content="kush patel">

  <title>Campus Navigator</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="ambient-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="navigator-app">
    <header class="app-head">
      <h1>Campus <span class="highlight">Navigator</span></h1>
      <p>Select your route, follow the visual guide, and reach your destination with ease.</p>
    </header>

    <section class="route-controls">
      <div class="field">
        <label>Starting Point</label>
        <div style="height: 50px; background-color: #2b2b2b; color: #999; border: 1px solid #3d3d3d; border-radius: 6px; padding: 0 15px; font-size: 16px; display: flex; align-items: center; cursor: not-allowed;">
          🛋 King's Lounge
        </div>
      </div>
      <div class="field">
        <label for="toSelect">Destination</label>
        <div class="select-wrapper">
          <select id="toSelect"></select>
        </div>
      </div>
      <button id="buildBtn" class="primary-btn" type="button">Find Route</button>
    </section>
    <p id="feedback" class="feedback"></p>

    <section id="routeSummary" class="route-summary hidden"></section>

    <section id="stage" class="stage hidden">
      <div class="stage-top">
        <strong id="stepTitle" class="step-title"></strong>
        <span id="stepCounter" class="step-counter"></span>
      </div>

      <div class="photo-frame-wrapper">
        <div id="imageLoader" class="skeleton-loader fade">
          <div class="spinner"></div>
          <span>Loading Route Image...</span>
        </div>
        
        <div class="photo-frame fade" id="photoFrame">
          <img id="stepPhoto" alt="Direction step photo" />
          <div id="arrowOverlay" class="arrow-overlay">
            <svg id="arrowSvg" viewBox="0 0 120 120" aria-hidden="true"></svg>
            <span id="arrowText"></span>
          </div>
        </div>
      </div>

      <p id="stepDesc" class="step-desc fade"></p>

      <div class="step-actions">
        <button id="prevBtn" class="ghost-btn" type="button">
           <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
           Previous
        </button>
        <button id="nextBtn" class="primary-btn" type="button">
          Next
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
    </section>

    <section id="timeline" class="timeline hidden"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
